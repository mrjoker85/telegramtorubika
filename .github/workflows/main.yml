name: Telegram To Rubika Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python Packages
      run: |
        pip install pyrogram tgcrypto rubpy python-dotenv aiohttp

    - name: Run Python Bot
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        RUBIKA_AUTH: ${{ secrets.RUBIKA_AUTH }}
      run: python bot.py
